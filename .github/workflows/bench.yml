name: Benchmark

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  bench:
    name: Benchmark (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run benchmark comparison
        run: cargo run --release --example bench_compare
